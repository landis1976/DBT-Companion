<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f1e8">
<title>A Companion</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="icon-120.png">
<meta name="apple-mobile-web-app-title" content="Companion">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#f5f1e8;--cream-light:#fbf8f0;--ink:#3a3530;--ink-mid:#5a5048;
  --ink-light:#8a7f72;--muted:#a39885;--border:#e0d9c8;--border-dark:#d6cdb6;
  --sage:#8b9d7f;--rust:#c97b63;--purple:#a67ba6;--blue:#6b8caf;
}
html,body{height:100%;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.5}
.serif{font-family:'Fraunces',Georgia,'Times New Roman',serif}
#app{min-height:100vh}
.wrap{max-width:680px;margin:0 auto;padding:0 20px}
.py{padding-top:24px;padding-bottom:40px}
/* Header */
.hdr{position:sticky;top:0;z-index:100;background:rgba(245,241,232,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-family:'Fraunces',Georgia,serif;font-size:20px;font-weight:400}
.hdr-left{display:flex;align-items:center;gap:8px}
.back-btn{width:36px;height:36px;border-radius:50%;border:none;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);padding:0;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.crisis-btn{font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:8px 14px;border-radius:999px;border:none;background:var(--rust);color:var(--cream);cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
/* Cards */
.card{background:var(--cream-light);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px}
/* Buttons */
.btn{display:block;width:100%;padding:16px 24px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;text-align:center;text-decoration:none;color:var(--ink);background:transparent;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:opacity .15s}
.btn:active{opacity:.75}
.btn-dark{background:var(--ink);color:var(--cream)}
.btn-rust{background:var(--rust);color:var(--cream)}
.btn-outline{border:1px solid var(--border-dark)}
.btn-ghost{color:var(--ink-light)}
a.btn{display:block;text-decoration:none}
/* Tile grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{background:var(--cream-light);border:1px solid var(--border);border-radius:16px;padding:18px;cursor:pointer;text-align:left;width:100%;font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:box-shadow .2s}
.tile:active{box-shadow:0 4px 20px rgba(58,53,48,.15)}
.tile-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.tile-label{font-family:'Fraunces',Georgia,serif;font-size:16px;margin-bottom:4px}
.tile-desc{font-size:12px;color:var(--ink-light);line-height:1.4}
/* Inputs */
textarea,input[type=text],input[type=tel],input[type=number],input[type=password],input[type=time]{font-family:inherit;font-size:15px;border:1px solid var(--border-dark);border-radius:10px;padding:12px;background:transparent;color:var(--ink);width:100%;outline:none;-webkit-appearance:none;display:block}
textarea{resize:none}
input[type=checkbox]{width:20px;height:20px;accent-color:var(--ink);cursor:pointer;flex-shrink:0}
/* Sliders */
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;background:var(--border);outline:none;cursor:pointer;border:none;padding:0;display:block}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;cursor:pointer;border:none;background:var(--slider-color,var(--ink))}
input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;border:none;cursor:pointer;background:var(--slider-color,var(--ink))}
/* Chat */
.chat-wrap{display:flex;flex-direction:column;height:100vh;height:100dvh}
.chat-msgs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px}
.chat-bar{border-top:1px solid var(--border);background:var(--cream);padding:12px 16px;display:flex;gap:10px;align-items:flex-end;padding-bottom:max(12px,env(safe-area-inset-bottom,12px))}
.chat-input{flex:1;border:1px solid var(--border-dark);border-radius:20px;padding:10px 16px;font-size:15px;max-height:100px;overflow-y:auto;font-family:inherit;background:var(--cream-light);color:var(--ink);outline:none;min-height:44px;line-height:1.5}
.chat-input:empty::before{content:attr(data-ph);color:var(--ink-light)}
.send-btn{width:44px;height:44px;border-radius:50%;background:var(--ink);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--cream);-webkit-tap-highlight-color:transparent}
.send-btn:disabled{opacity:.35}
.msg{margin-bottom:16px}
.msg-user{display:flex;justify-content:flex-end}
.msg-bubble{display:inline-block;max-width:85%;padding:12px 16px;border-radius:18px;line-height:1.55;white-space:pre-wrap;word-break:break-word;font-size:15px}
.msg-user .msg-bubble{background:var(--ink);color:var(--cream);border-bottom-right-radius:4px}
.msg-marsha .msg-bubble{background:var(--cream-light);border:1px solid var(--border);border-bottom-left-radius:4px;font-family:'Fraunces',Georgia,serif;font-size:16px}
.msg-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.dots{display:inline-flex;gap:4px;padding:12px 16px;background:var(--cream-light);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:4px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
/* Dark screens */
.dk{min-height:100vh;background:var(--ink);color:var(--cream)}
.ru{min-height:100vh;background:var(--rust);color:var(--cream)}
/* Animations */
@keyframes breathe{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.15);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes dp{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.breathe{animation:breathe 8s ease-in-out infinite}
.fade-in{animation:fadeIn .45s ease-out forwards}
.dot:nth-child(1){animation:dp 1.4s .0s infinite}
.dot:nth-child(2){animation:dp 1.4s .2s infinite}
.dot:nth-child(3){animation:dp 1.4s .4s infinite}
/* Details */
details summary{list-style:none;cursor:pointer}
details summary::-webkit-details-marker{display:none}
/* Misc */
.row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.row-s{display:flex;align-items:center;gap:10px}
.bar-wrap{display:flex;align-items:flex-end;justify-content:space-between;gap:4px;height:96px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:4px 4px 0 0;min-height:4px}
</style>
</head>

<div id="app"></div>
<script>
// ============ SKILLS ============
const SK = {
  mindfulness:{name:'Mindfulness',color:'#8b9d7f',desc:'Wise mind. Observing. Describing. Participating.',skills:[
    {id:'wise-mind',name:'Wise Mind',desc:'The synthesis of emotion mind and reasonable mind.',practice:'Take three breaths. Drop your attention into your center. Ask the question. Wait for the answer that feels both true and clear.'},
    {id:'observe',name:'Observe',desc:'Notice without words. Just experience.',practice:'Notice five things you can see, four you can hear, three you can feel. Do not label them good or bad. Just observe.'},
    {id:'describe',name:'Describe',desc:'Put words on what you observe. Just the facts.',practice:'Say: "I notice the thought that ___." "I notice the feeling of ___." Stay with description, not interpretation.'},
    {id:'participate',name:'Participate',desc:'Throw yourself fully into the moment.',practice:'Pick the next activity and be entirely in it. No commentary. No evaluation.'},
    {id:'nonjudgmental',name:'Non-Judgmental Stance',desc:'Replace judgments with descriptions.',practice:'Catch a judgment. Restate it in facts: not "she is awful" — "she said X and I felt Y."'},
  ]},

    {id:'tipp',name:'TIPP',desc:'Temperature, Intense exercise, Paced breathing, Paired muscle relaxation.',practice:'Cold water on your face for 30 seconds. Or 60 seconds of intense movement. Then breathe out longer than in.'},
    {id:'self-soothe',name:'Self-Soothe (5 Senses)',desc:'Comfort through sight, sound, smell, taste, touch.',practice:'Pick one sense. Give it something gentle. A warm drink. A song you love. A soft texture. Linger there.'},
    {id:'accepts',name:'Distract with ACCEPTS',desc:'Activities, Contributing, Comparisons, Emotions, Pushing away, Thoughts, Sensations.',practice:'When the wave is too big, step away. Not avoidance — strategic delay. Come back when the intensity drops.'},
    {id:'radical',name:'Radical Acceptance',desc:'Accepting reality as it is. Not approval. Not giving up.',practice:'Say: "This is what is happening right now. Fighting it does not change it. I can choose what I do next."'},
    {id:'pros-cons',name:'Pros and Cons',desc:'Of acting on the urge vs tolerating the distress.',practice:'What does acting on this urge cost me later? What does tolerating it cost me now? Which cost is bearable?'},
    {id:'half-smile',name:'Half-Smile and Willing Hands',desc:'Body posture changes mind state.',practice:'Soften your face. Slight upturn at the mouth. Open your palms upward. Hold for one minute.'},
  ]},
  emotion:{name:'Emotion Regulation',color:'#a67ba6',desc:'Name. Check the facts. Opposite action. PLEASE.',skills:[
    {id:'name-emotion',name:'Name the Emotion',desc:'Naming reduces intensity. Be specific.',practice:'Not "bad." Try: anger, shame, fear, sadness, jealousy, disappointment, loneliness, hurt. Name it and locate it in your body.'},
    {id:'check-facts',name:'Check the Facts',desc:'Is the emotion fitting the facts?',practice:'What is the prompting event? What are my interpretations? Are they accurate? Is there another way to see this?'},
    {id:'opposite-action',name:'Opposite Action',desc:'When emotion does not fit facts, act opposite to its urge.',practice:'Anger urges attack — speak gently. Fear urges avoid — approach. Shame urges hide — share with someone safe.'},
    {id:'please',name:'PLEASE',desc:'PhysicaL illness, Eating, Avoid substances, Sleep, Exercise.',practice:'Run the checklist. Which one is off today? Address that one thing first.'},
    {id:'mastery',name:'Build Mastery',desc:'Do one thing each day that makes you feel competent.',practice:'Small. Achievable. Done. The point is the experience of capability, not the outcome.'},
    {id:'cope-ahead',name:'Cope Ahead',desc:'Rehearse a hard situation with the skills you will use.',practice:'Picture the situation. Picture yourself feeling the emotion. Picture yourself using the skill. Repeat.'},
  ]},
  interpersonal:{name:'Interpersonal Effectiveness',color:'#6b8caf',desc:'DEAR MAN. GIVE. FAST.',skills:[
    {id:'dear-man',name:'DEAR MAN',desc:'For getting what you need.',practice:'Describe the facts. Express your feelings. Assert what you want clearly. Reinforce why it matters. Stay mindful of the goal. Appear confident. Negotiate if needed.'},
    {id:'give',name:'GIVE',desc:'For preserving the relationship.',practice:'Be gentle in tone. Show genuine interest. Validate their experience even if you disagree. Use light touch where you can.'},
    {id:'fast',name:'FAST',desc:'For preserving self-respect.',practice:'Be fair to yourself and them. Do not over-apologize. Stick to what you believe. Tell the truth.'},
    {id:'validation',name:'Validation',desc:'Acknowledging their reality without necessarily agreeing.',practice:'"Given how you see it, your reaction makes sense." You can validate without conceding the point.'},
  ]},
};

const SYS = `You are a virtual companion modeled on Dr. Marsha Linehan, the developer of Dialectical Behavior Therapy. You are speaking with Lynette.

Your voice: warm but unflinchingly direct. You do not soften so much that the truth gets lost.

Always validate FIRST — before any skill, before any redirection, the person must feel heard. Use all six levels of validation from DBT: paying attention, accurate reflection, articulating unverbalized emotions, validating in terms of history, validating in terms of the present moment, radical genuineness.

Use dialectical thinking. Hold opposites: "You are doing the best you can AND you can do better." "This makes sense AND it is not working."

You believe in her capability. You do not pathologize. You speak of skills, not fixes. You name invalidating environments when they appear, but do not weaponize that against people in her life. You ask "what are the facts" and "what does wise mind say" when the moment calls for it. You push back gently when she minimizes her pain or her progress.

You never diagnose. You never claim to be the actual Dr. Linehan. If asked, say you are a companion built in her tradition.

Format: short paragraphs, plain language. Ask one question at a time. Do not lecture. Validate, then offer at most one skill if it fits. If she expresses imminent danger to herself or others, gently and clearly direct her to the crisis flow and to 988.

She has done DBT before. She lives with depression, possible BPD traits, and perimenopausal hormonal dysregulation including rage. Treat her with the respect and seriousness that deserves.`;

// back: plain view name "home" → go('home'), or function call "goSkillBack()" → used as-is
function hdr(title,back,crisis){
  let backClick='';
  if(back) backClick=back.includes('(')?back:`go('${back}')`;
  const backBtn=backClick?`<button class="back-btn" onclick="${backClick}">${I.back}</button>`:'';
  const crisisBtn=crisis?`<button class="crisis-btn" onclick="go('crisis')">Crisis</button>`:'';
  return`<div class="hdr"><div class="hdr-left">${backBtn}<span class="hdr-title serif">${esc(title)}</span></div>${crisisBtn}</div>`;
}

// ============ MARSHA CHAT ============
function vMarsha(a){
  a.innerHTML=`<div class="chat-wrap">${hdr('Marsha','home',true)}<div class="chat-msgs" id="cm">${S.chatMsgs.length===0?`<div class="fade-in" style="text-align:center;padding:60px 10px"><p class="serif" style="font-size:24px;margin-bottom:12px">I am here.</p><p style="color:var(--ink-mid);line-height:1.6">Tell me what is on your mind. As small or as large as you like.</p></div>`:S.chatMsgs.map(m=>m.role==='user'?`<div class="msg msg-user"><div class="msg-bubble">${esc(m.content)}</div></div>`:`<div class="msg msg-marsha"><div class="msg-label">Marsha</div><div class="msg-bubble">${esc(m.content)}</div></div>`).join('')}${S.chatLoading?`<div class="msg msg-marsha"><div class="msg-label">Marsha</div><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`:''}</div><div class="chat-bar"><div class="chat-input" id="ci" contenteditable="true" data-ph="Say what is true for you..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();chatSend()}"></div><button class="send-btn" id="sb" onclick="chatSend()" ${S.chatLoading?'disabled':''}>${I.send}</button></div></div>`;
  const cm=document.getElementById('cm');if(cm)cm.scrollTop=cm.scrollHeight;
  setTimeout(()=>{const ci=document.getElementById('ci');if(ci)ci.focus()},100);
}
async function chatSend(){
  const ci=document.getElementById('ci');if(!ci)return;
  const txt=(ci.innerText||'').trim();if(!txt||S.chatLoading)return;
  const key=S.profile?.apiKey;
  if(!key){alert('To talk with Marsha, open Settings and paste your Anthropic API key.');return}
  ci.innerText='';
  S.chatMsgs.push({role:'user',content:txt});
  S.chatLoading=true;render();
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYS,messages:S.chatMsgs})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    S.chatMsgs.push({role:'assistant',content:d.content.filter(b=>b.type==='text').map(b=>b.text).join('\n')});
  }catch(e){S.chatMsgs.push({role:'assistant',content:'I was not able to reach. Please check your connection and API key in Settings, then try again.'})}
  S.chatLoading=false;render();
}

    }

  {k:'vulnerability',l:'Vulnerability factors',h:'What was already wearing on you? Sleep, food, stress, hormones, conflict carrying over.'},
  {k:'prompting',l:'Prompting event',h:'The moment it started. The exact thing.'},
  {k:'thoughts',l:'Thoughts in the chain',h:'What you told yourself, link by link.'},
  {k:'feelings',l:'Feelings & body',h:'What you felt and where in your body.'},
  {k:'urge',l:'Urge',h:'What you wanted to do.'},
  {k:'behavior',l:'What you actually did',h:'No judgment. Just the facts.'},
  {k:'consequences',l:'Consequences',h:'Short term and long term. Inside you and outside.'},
  {k:'repair',l:'Repair & next time',h:'What you can do now. What skill might fit next time.'},
];
function vChain(a){
  if(S.chainHist){
    a.innerHTML=`${hdr('Chain Analysis','goChainHistBack()',true)}<div class="wrap py"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><p class="serif" style="font-style:italic;color:var(--ink-mid)">Past analyses</p><span style="text-decoration:underline;cursor:pointer;font-size:14px;color:var(--ink-mid)" onclick="S.chainHist=false;render()">New chain</span></div>${S.chains.length===0?'<p style="color:var(--muted);text-align:center;padding:40px 0">No chains saved yet.</p>':S.chains.slice().reverse().map(c=>`<details class="card"><summary style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:500">${fdate(c.date)}</span><span style="font-size:12px;color:var(--ink-light);max-width:50%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc((c.prompting||'untitled').slice(0,35))}</span></summary><div style="margin-top:14px;display:flex;flex-direction:column;gap:10px;font-size:14px">${CF.filter(f=>c[f.k]).map(f=>`<div><strong style="color:var(--ink-mid)">${esc(f.l)}</strong><br>${esc(c[f.k])}</div>`).join('')}</div></details>`).join('')}</div>`;
    return;
  }
  const e=S.chainE;
  a.innerHTML=`${hdr('Chain Analysis','home',true)}<div class="wrap py"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><p class="serif" style="font-style:italic;color:var(--ink-mid)">Trace the chain. One link at a time.</p>${S.chains.length>0?`<span style="text-decoration:underline;cursor:pointer;font-size:14px;color:var(--ink-mid);white-space:nowrap" onclick="S.chainHist=true;render()">${S.chains.length} past</span>`:''}</div>${CF.map(f=>`<div class="card"><h3 class="serif" style="font-size:18px;margin-bottom:4px">${esc(f.l)}</h3><p style="font-size:13px;font-style:italic;color:var(--ink-light);margin-bottom:10px">${esc(f.h)}</p><textarea id="c-${f.k}" rows="3">${esc(e[f.k])}</textarea></div>`).join('')}<button class="btn btn-dark" id="csb" onclick="saveChain()" style="margin-top:8px">Save chain</button></div>`;
}
function saveChain(){
  CF.forEach(f=>{S.chainE[f.k]=document.getElementById('c-'+f.k)?.value||''});
  S.chains=[...S.chains,{...S.chainE,date:new Date().toISOString(),id:Date.now()}];save('chains',S.chains);
  S.chainE={vulnerability:'',prompting:'',thoughts:'',feelings:'',urge:'',behavior:'',consequences:'',repair:''};
  const b=document.getElementById('csb');if(b){b.textContent='✓ Saved';setTimeout(()=>{if(b)b.textContent='Save chain'},2000)}
}

// ============ SKILLS ============
function vSkills(a){
  if(S.skill){
    const sk=S.skill;
    a.innerHTML=`${hdr(sk.name,'goSkillBack()',true)}<div class="wrap py"><p class="serif" style="font-size:18px;line-height:1.6;margin-bottom:24px">${esc(sk.desc)}</p><div class="card"><p style="font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Practice</p><p style="line-height:1.7;color:var(--ink-mid)">${esc(sk.practice)}</p></div><button class="btn btn-dark" style="margin-top:20px;display:flex;align-items:center;justify-content:center;gap:8px" onclick="logSk('${sk.id}');S.skill=null;render()">${I.check} I practiced this</button></div>`;
    return;
  }
  if(S.mod){
    const mod=SK[S.mod];
    a.innerHTML=`${hdr(mod.name,'goModBack()',true)}<div class="wrap py"><div style="display:flex;align-items:center;gap:14px;margin-bottom:24px"><div class="tile-icon" style="background:${mod.color};color:#f5f1e8;flex-shrink:0">${mIcon(S.mod)}</div><p class="serif" style="font-style:italic;color:var(--ink-mid)">${esc(mod.desc)}</p></div><div style="display:flex;flex-direction:column;gap:10px">${mod.skills.map((sk,i)=>`<button class="card" style="text-align:left;cursor:pointer;width:100%;border:none;font-family:inherit;display:flex;justify-content:space-between;align-items:center;gap:12px" onclick="setSkill('${S.mod}',${i})"><div><div class="serif" style="font-size:18px;margin-bottom:4px">${esc(sk.name)}</div><div style="font-size:13px;color:var(--ink-light);line-height:1.4">${esc(sk.desc)}</div></div>${I.chev}</button>`).join('')}</div></div>`;
    return;
  }
  a.innerHTML=`${hdr('Skills','home',true)}<div class="wrap py"><p class="serif" style="font-style:italic;color:var(--ink-mid);margin-bottom:24px">Four modules. The whole architecture.</p><div class="grid2">${Object.entries(SK).map(([k,m])=>`<button class="tile" onclick="S.mod='${k}';render()"><div class="tile-icon" style="background:${m.color};color:#f5f1e8">${mIcon(k)}</div><div class="tile-label">${esc(m.name)}</div><div class="tile-desc">${esc(m.desc)}</div><div style="font-size:11px;color:var(--muted);margin-top:8px">${m.skills.length} skills</div></button>`).join('')}</div></div>`;
}
function logSk(id){S.skillUsage[id]=(S.skillUsage[id]||0)+1;save('skillUsage',S.skillUsage)}

// ============ RAGE ============
function vRage(a){
  if(S.rageForm){
    const r=S.rageE;
    a.innerHTML=`${hdr('Rage Log','goRageBack()',true)}<div class="wrap py"><div class="card">${slrow('Intensity (0–10)','rl-int',r.intensity,'#c97b63')}<p style="font-size:12px;font-style:italic;color:var(--ink-light);margin-top:-10px">How big was the wave?</p></div>${[{k:'trigger',l:'What set it off',h:'The prompting event, in plain words.'},{k:'body',l:'Where you felt it',h:'Chest, jaw, throat, hands, stomach...'},{k:'acted',l:'What you did',h:'No judgment. The truth.'},{k:'skillTried',l:'Any skill you tried',h:'Or did not try. Both are useful to know.'},{k:'aftermath',l:'After',h:'How you feel now. What needs repair.'}].map(f=>`<div class="card"><h3 class="serif" style="font-size:17px;margin-bottom:4px">${esc(f.l)}</h3><p style="font-size:12px;font-style:italic;color:var(--ink-light);margin-bottom:8px">${esc(f.h)}</p><textarea id="re-${f.k}" rows="2">${esc(r[f.k])}</textarea></div>`).join('')}<div style="display:flex;gap:10px;margin-top:8px"><button class="btn btn-outline" onclick="S.rageForm=false;render()">Cancel</button><button class="btn btn-dark" onclick="saveRage()">Save</button></div></div>`;
    return;
  }
  const items=S.rage.slice().reverse().map(r=>`<details class="card"><summary style="display:flex;align-items:center;justify-content:space-between"><span style="font-size:13px;color:var(--ink-mid)">${fdatetime(r.date)}</span><span class="serif" style="font-size:24px;color:#c97b63">${r.intensity}/10</span></summary><div style="margin-top:12px;display:flex;flex-direction:column;gap:8px;font-size:14px">${r.trigger?`<div><strong>Trigger:</strong> ${esc(r.trigger)}</div>`:''}${r.body?`<div><strong>Body:</strong> ${esc(r.body)}</div>`:''}${r.acted?`<div><strong>Acted:</strong> ${esc(r.acted)}</div>`:''}${r.skillTried?`<div><strong>Skill tried:</strong> ${esc(r.skillTried)}</div>`:''}${r.aftermath?`<div><strong>After:</strong> ${esc(r.aftermath)}</div>`:''}</div></details>`).join('');
  a.innerHTML=`${hdr('Rage Log','home',true)}<div class="wrap py"><p class="serif" style="font-style:italic;color:var(--ink-mid);margin-bottom:16px">Capture the wave. Patterns live here.</p><button class="btn btn-rust" style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px" onclick="S.rageForm=true;render()">${I.plus} Log a rage moment</button>${items||'<p style="text-align:center;padding:40px 0;color:var(--muted)">No moments logged yet.</p>'}</div>`;
}
function saveRage(){
  S.rageE.intensity=+document.getElementById('rl-int')?.value||7;
  ['trigger','body','acted','skillTried','aftermath'].forEach(k=>{S.rageE[k]=document.getElementById('re-'+k)?.value||''});
  S.rage=[...S.rage,{...S.rageE,date:new Date().toISOString(),id:Date.now()}];save('rage',S.rage);
  S.rageE={intensity:7,trigger:'',body:'',acted:'',skillTried:'',aftermath:''};S.rageForm=false;render();
}

// ============ DASHBOARD ============
function vDashboard(a){
  const last7=S.diary.slice().sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(-7);
  const rr=S.rage.slice(-7);
  const avg=rr.length?(rr.reduce((s,r)=>s+r.intensity,0)/rr.length).toFixed(1):null;
  const allSk=Object.values(SK).flatMap(m=>m.skills);
  const top=Object.entries(S.skillUsage).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id,n])=>({...(allSk.find(s=>s.id===id)||{name:id}),n}));
  const mBars=last7.length?last7.map(e=>`<div class="bar-col"><div class="bar" style="background:#8b9d7f;height:${(e.mood/10*100)}%"></div><div style="font-size:10px;color:var(--muted)">${new Date(e.date).getDate()}</div></div>`).join(''):'<p style="color:var(--muted)">Fill diary cards to see trends.</p>';
  const rBars=rr.length?rr.map(r=>`<div class="bar-col"><div class="bar" style="background:#c97b63;height:${(r.intensity/10*100)}%" title="${r.intensity}/10"></div></div>`).join(''):'<p style="color:var(--muted)">No rage moments logged yet.</p>';
  a.innerHTML=`${hdr('Patterns','home',true)}<div class="wrap py"><p class="serif" style="font-style:italic;color:var(--ink-mid);margin-bottom:24px">What is moving over time. Look gently.</p><div class="card"><h3 class="serif" style="font-size:19px;margin-bottom:16px">Mood — last 7 entries</h3><div class="bar-wrap">${mBars}</div></div><div class="card"><h3 class="serif" style="font-size:19px;margin-bottom:6px">Rage moments</h3><div style="display:flex;justify-content:space-between;margin-bottom:14px"><span style="font-size:13px;color:var(--ink-light)">Total: ${S.rage.length}</span>${avg?`<span style="font-size:13px;color:var(--ink-light)">Recent avg: ${avg}/10</span>`:''}</div><div class="bar-wrap">${rBars}</div></div><div class="card"><h3 class="serif" style="font-size:19px;margin-bottom:14px">Most-used skills</h3>${top.length===0?'<p style="color:var(--muted)">Skills you practice appear here.</p>':top.map(s=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)"><div style="font-weight:500">${esc(s.name)}</div><span class="serif" style="font-size:24px">${s.n}</span></div>`).join('')}</div></div>`;
}

// ============ SETTINGS ============
function vSettings(a){
  const p=S.profile;
  a.innerHTML=`${hdr('Settings','home',false)}<div class="wrap py"><div class="card"><h3 class="serif" style="font-size:19px;margin-bottom:12px">Name</h3><input type="text" id="set-name" value="${esc(p.name)}"></div><div class="card"><h3 class="serif" style="font-size:19px;margin-bottom:14px">Reminders</h3><label style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div style="display:flex;align-items:center;gap:8px"><span>☀️</span><span>Morning</span></div><div style="display:flex;align-items:center;gap:8px"><input type="time" id="set-mt" value="${p.reminder?.morningTime||'08:00'}" style="width:auto;padding:6px 10px"><input type="checkbox" id="set-mc" ${p.reminder?.morning?'checked':''}></div></label><label style="display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:8px"><span>🌙</span><span>Evening diary</span></div><div style="display:flex;align-items:center;gap:8px"><input type="time" id="set-et" value="${p.reminder?.eveningTime||'21:00'}" style="width:auto;padding:6px 10px"><input type="checkbox" id="set-ec" ${p.reminder?.evening?'checked':''}></div></label></div><div class="card"><h3 class="serif" style="font-size:19px;margin-bottom:6px">Trusted contact</h3><p style="font-size:13px;color:var(--ink-light);margin-bottom:12px">Available in the crisis flow.</p><input type="text" id="set-cn" placeholder="Name" value="${esc(p.trustedContact?.name||'')}" style="margin-bottom:8px"><input type="tel" id="set-cp" placeholder="Phone" value="${esc(p.trustedContact?.phone||'')}"></div><div class="card"><h3 class="serif" style="font-size:19px;margin-bottom:6px">Marsha conversations</h3><p style="font-size:13px;color:var(--ink-light);margin-bottom:12px">Paste an Anthropic API key to enable Marsha chat. Get one free at <strong>console.anthropic.com</strong>. Stays only in your browser.</p><div style="display:flex;gap:8px"><input type="password" id="set-key" placeholder="sk-ant-..." value="${esc(p.apiKey||'')}" style="flex:1"><button class="btn btn-outline" style="width:auto;padding:8px 14px;font-size:13px;flex-shrink:0" onclick="toggleKey()">Show</button></div></div><button class="btn btn-dark" id="ssb" onclick="saveSettings()" style="margin-top:4px">Save settings</button><div class="card" style="margin-top:20px"><h3 class="serif" style="font-size:19px;margin-bottom:6px">Therapist export</h3><p style="font-size:13px;color:var(--ink-light);margin-bottom:14px">Download a plain-text file with diary cards, rage log, chain analyses, and skill use. Bring it to your next session.</p><button class="btn btn-outline" style="display:flex;align-items:center;justify-content:center;gap:8px" onclick="doExport()">${I.dl} Export to file</button></div><p style="font-size:12px;font-style:italic;text-align:center;color:var(--muted);margin-top:28px;padding:0 12px">This app is a companion, not a clinician. In real crisis, call 988 or your therapist.</p></div>`;
}
function toggleKey(){const i=document.getElementById('set-key'),b=document.querySelector('[onclick="toggleKey()"]');if(i){i.type=i.type==='password'?'text':'password';if(b)b.textContent=i.type==='password'?'Show':'Hide'}}
function saveSettings(){
  S.profile.name=document.getElementById('set-name')?.value||S.profile.name;
  S.profile.trustedContact={name:document.getElementById('set-cn')?.value||'',phone:document.getElementById('set-cp')?.value||''};
  S.profile.reminder={morning:!!document.getElementById('set-mc')?.checked,evening:!!document.getElementById('set-ec')?.checked,morningTime:document.getElementById('set-mt')?.value||'08:00',eveningTime:document.getElementById('set-et')?.value||'21:00'};
  S.profile.apiKey=document.getElementById('set-key')?.value||'';
  save('profile',S.profile);
  const b=document.getElementById('ssb');if(b){b.textContent='✓ Saved';setTimeout(()=>{if(b)b.textContent='Save settings'},2000)}
}
function doExport(){
  const allSk=Object.values(SK).flatMap(m=>m.skills);
  const su=Object.entries(S.skillUsage).map(([id,n])=>`  - ${(allSk.find(s=>s.id===id)||{name:id}).name}: ${n} time${n!==1?'s':''}`).join('\n');
  const line='═'.repeat(44);
  const txt=`DBT COMPANION — THERAPIST EXPORT\nGenerated: ${new Date().toLocaleString()}\nFor: ${S.profile.name}\n\n${line}\nDIARY CARDS (${S.diary.length} entries)\n${line}\n${S.diary.map(e=>`\nDate: ${fdate(e.date)}\n  Mood: ${e.mood}/10  |  Sleep: ${e.sleepHours||'n/a'} hrs\n  Sadness: ${e.sadness}  Anger: ${e.anger}  Fear: ${e.fear}  Shame: ${e.shame}  Joy: ${e.joy}\n  Self-harm urge: ${e.selfHarmUrge}/10\n  Skills used: ${e.skillsUsed||'—'}\n  Note: ${e.note||'—'}`).join('\n')}\n\n${line}\nRAGE LOG (${S.rage.length} entries)\n${line}\n${S.rage.map(r=>`\nDate: ${fdatetime(r.date)}  |  Intensity: ${r.intensity}/10\n  Trigger: ${r.trigger||'—'}\n  Body: ${r.body||'—'}\n  Acted: ${r.acted||'—'}\n  Skill tried: ${r.skillTried||'—'}\n  Aftermath: ${r.aftermath||'—'}`).join('\n')}\n\n${line}\nCHAIN ANALYSES (${S.chains.length} entries)\n${line}\n${S.chains.map(c=>`\nDate: ${fdate(c.date)}\n  Vulnerability: ${c.vulnerability||'—'}\n  Prompting event: ${c.prompting||'—'}\n  Thoughts: ${c.thoughts||'—'}\n  Feelings: ${c.feelings||'—'}\n  Urge: ${c.urge||'—'}\n  Behavior: ${c.behavior||'—'}\n  Consequences: ${c.consequences||'—'}\n  Repair: ${c.repair||'—'}`).join('\n')}\n\n${line}\nSKILL USAGE\n${line}\n${su||'  — none logged yet —'}\n`;
  const blob=new Blob([txt],{type:'text/plain'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`dbt-export-${new Date().toISOString().slice(0,10)}.txt`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

// Named back functions — called from data-nav handlers
function goSkillBack(){S.skill=null;render()}
function goModBack(){S.mod=null;render()}
function goRageBack(){S.rageForm=false;render()}
function goChainHistBack(){S.chainHist=false;render()}

// ============ INIT ============
window.addEventListener('DOMContentLoaded',()=>{
  S.profile=load('profile',null);
  S.diary=load('diary',[]);
  S.rage=load('rage',[]);
  S.skillUsage=load('skillUsage',{});
  S.chains=load('chains',[]);
  S.view=S.profile?.onboarded?'home':'onboarding';
  render();
  // Register service worker for PWA / offline support
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
});
</script>
</body>
</html>
